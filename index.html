<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>her voice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #222;
    --accent: #c8a97e;
    --accent-dim: rgba(200, 169, 126, 0.15);
    --text: #e8e0d5;
    --text-muted: #5a5550;
    --waveform: #2a2520;
    --waveform-active: #c8a97e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 40px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.6;
  }

  header {
    text-align: center;
    margin-bottom: 60px;
    animation: fadeDown 0.8s ease both;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(2.5rem, 6vw, 4rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  header p {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .container {
    width: 100%;
    max-width: 680px;
    animation: fadeUp 0.8s 0.15s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .now-playing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .now-playing::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .track-info {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 28px;
  }

  .track-number {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    padding-top: 4px;
    min-width: 24px;
  }

  .track-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.2;
    flex: 1;
  }

  .track-name.empty {
    color: var(--text-muted);
    font-style: italic;
    font-size: 1rem;
  }

  .track-duration {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    padding-top: 4px;
  }

  .waveform {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 40px;
    margin-bottom: 16px;
  }

  .waveform-bar {
    flex: 1;
    background: var(--waveform);
    border-radius: 1px;
    transition: background 0.08s;
  }

  .waveform-bar.active {
    background: var(--waveform-active);
  }

  .progress-track {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    cursor: pointer;
    margin-bottom: 6px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
  }

  .progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    margin-top: 28px;
  }

  .btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  .btn:hover { color: var(--accent); }

  .btn-play {
    width: 48px; height: 48px;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--accent);
    transition: all 0.2s;
  }

  .btn-play:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .mode-badge {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
    transition: all 0.2s;
    user-select: none;
  }

  .mode-badge.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .playlist {
    display: flex;
    flex-direction: column;
    gap: 1px;
    margin-bottom: 8px;
  }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .playlist-item:hover { border-color: var(--border); background: #181818; }
  .playlist-item.active { border-color: var(--accent); background: var(--accent-dim); }
  .playlist-item.active .item-num { color: var(--accent); }
  .playlist-item.active .item-name { color: var(--accent); }

  .item-num {
    font-size: 0.6rem;
    color: var(--text-muted);
    min-width: 20px;
    letter-spacing: 0.1em;
  }

  .item-name {
    flex: 1;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-dur {
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .playing-dot {
    display: none;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  .playlist-item.active.playing .playing-dot { display: block; }
  .playlist-item.active.playing .item-num { display: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    padding: 16px 0;
    border-top: 1px solid var(--border);
    margin-bottom: 40px;
  }

  /* Loading / Error states */
  .status-msg {
    text-align: center;
    padding: 48px 0;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--text-muted);
  }

  .status-msg.error {
    color: #c0392b;
  }

  audio { display: none; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>her voice</h1>
  <p>a private archive</p>
</header>

<div class="container">

  <div class="now-playing">
    <div class="track-info">
      <span class="track-number" id="nowNum">—</span>
      <span class="track-name empty" id="nowName">loading...</span>
      <span class="track-duration" id="nowDur">—</span>
    </div>
    <div class="waveform" id="waveform"></div>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-times">
      <span id="timeNow">0:00</span>
      <span id="timeTotal">0:00</span>
    </div>
    <div class="controls">
      <button class="btn" id="btnPrev">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="btn btn-play" id="btnPlay">
        <svg id="iconPlay" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="btn" id="btnNext">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6zm8.5-6V6H17v12h-2.5z"/></svg>
      </button>
      <span class="mode-badge active" id="modeToggle">loop all</span>
    </div>
  </div>

  <div class="section-label">archive</div>
  <div class="playlist" id="playlist">
    <div class="status-msg" id="statusMsg">loading recordings...</div>
  </div>
  <div class="stats" id="stats" style="display:none">
    <span id="statCount"></span>
    <span id="statTotal"></span>
  </div>

</div>

<audio id="audioEl"></audio>

<script>
// ─── 底层理解 ──────────────────────────────────────────────────────────────────
// 这个网页部署在 GitHub Pages 上
// 它会先去请求同目录下的 manifest.json 文件
// manifest.json 就是一个"目录清单"，列出所有语音文件的信息
// 然后网页根据这个清单，依次加载 voices/ 文件夹里的音频文件
// 添加新语音 = 往 voices/ 里加文件 + 更新 manifest.json
// ──────────────────────────────────────────────────────────────────────────────

let tracks = [];
let current = -1;
let isPlaying = false;
let loopAll = true;

const audio        = document.getElementById('audioEl');
const btnPlay      = document.getElementById('btnPlay');
const btnPrev      = document.getElementById('btnPrev');
const btnNext      = document.getElementById('btnNext');
const iconPlay     = document.getElementById('iconPlay');
const iconPause    = document.getElementById('iconPause');
const progressFill = document.getElementById('progressFill');
const progressTrack= document.getElementById('progressTrack');
const timeNow      = document.getElementById('timeNow');
const timeTotal    = document.getElementById('timeTotal');
const nowName      = document.getElementById('nowName');
const nowNum       = document.getElementById('nowNum');
const nowDur       = document.getElementById('nowDur');
const playlist     = document.getElementById('playlist');
const statusMsg    = document.getElementById('statusMsg');
const modeToggle   = document.getElementById('modeToggle');
const waveformEl   = document.getElementById('waveform');
const stats        = document.getElementById('stats');
const statCount    = document.getElementById('statCount');
const statTotal    = document.getElementById('statTotal');

// ─── WAVEFORM ─────────────────────────────────────────────────────────────────
function buildWaveform() {
  waveformEl.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const b = document.createElement('div');
    b.className = 'waveform-bar';
    b.style.height = (15 + Math.random() * 70) + '%';
    waveformEl.appendChild(b);
  }
}
buildWaveform();

function updateWaveform(pct) {
  const bars = waveformEl.children;
  const active = Math.floor(pct * bars.length);
  for (let i = 0; i < bars.length; i++) {
    bars[i].classList.toggle('active', i < active);
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateStats() {
  if (tracks.length === 0) { stats.style.display = 'none'; return; }
  stats.style.display = 'flex';
  statCount.textContent = `${tracks.length} recording${tracks.length > 1 ? 's' : ''}`;
  const total = tracks.reduce((a, t) => a + (t.duration || 0), 0);
  statTotal.textContent = total > 0 ? `total: ${fmt(total)}` : '';
}

// ─── LOAD MANIFEST ────────────────────────────────────────────────────────────
// fetch() 是浏览器内置的"发送网络请求"函数
// 就像你在浏览器地址栏输入URL然后获取内容，但是在代码里做
async function loadManifest() {
  try {
    const res = await fetch('manifest.json?t=' + Date.now()); // ?t= 防止缓存
    if (!res.ok) throw new Error('not found');
    const data = await res.json();  // 把 JSON 文本解析成 JS 对象

    tracks = data.tracks.map(t => ({
      name: t.name,
      file: t.file,
      duration: t.duration || null,
    }));

    if (tracks.length === 0) {
      statusMsg.textContent = 'no recordings yet';
      return;
    }

    renderPlaylist();
    loadTrack(0, false);  // 加载第一首但不自动播放
    nowName.textContent = tracks[0].name;
    nowName.classList.remove('empty');
    nowNum.textContent = '01';

  } catch (e) {
    statusMsg.textContent = 'could not load manifest.json';
    statusMsg.classList.add('error');
    nowName.textContent = 'error loading recordings';
  }
}

// ─── TRACK LOADING ────────────────────────────────────────────────────────────
function loadTrack(index, autoplay = true) {
  if (tracks.length === 0) return;
  current = index;
  const t = tracks[current];

  // 音频文件放在 voices/ 子目录里
  audio.src = 'voices/' + t.file;
  audio.load();

  nowName.textContent = t.name;
  nowName.classList.remove('empty');
  nowNum.textContent = String(current + 1).padStart(2, '0');
  nowDur.textContent = t.duration ? fmt(t.duration) : '—';
  timeTotal.textContent = t.duration ? fmt(t.duration) : '—';
  timeNow.textContent = '0:00';
  progressFill.style.width = '0%';
  buildWaveform();
  renderPlaylist();

  if (autoplay) {
    audio.play().then(() => { isPlaying = true; updatePlayBtn(); }).catch(() => {});
  }
}

// ─── PLAY / PAUSE ─────────────────────────────────────────────────────────────
function togglePlay() {
  if (tracks.length === 0) return;
  if (current === -1) { loadTrack(0); return; }
  if (isPlaying) {
    audio.pause(); isPlaying = false;
  } else {
    audio.play(); isPlaying = true;
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  iconPlay.style.display  = isPlaying ? 'none'  : 'block';
  iconPause.style.display = isPlaying ? 'block' : 'none';
  renderPlaylist();
}

function playPrev() {
  if (!tracks.length) return;
  loadTrack(current <= 0 ? tracks.length - 1 : current - 1);
}

function playNext() {
  if (!tracks.length) return;
  const next = current + 1;
  if (next >= tracks.length) {
    if (loopAll) loadTrack(0);
    else { isPlaying = false; updatePlayBtn(); }
    return;
  }
  loadTrack(next);
}

// ─── AUDIO EVENTS ─────────────────────────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = audio.currentTime / audio.duration;
  progressFill.style.width = (pct * 100) + '%';
  timeNow.textContent = fmt(audio.currentTime);
  updateWaveform(pct);
});

audio.addEventListener('loadedmetadata', () => {
  if (tracks[current] && !tracks[current].duration) {
    tracks[current].duration = audio.duration;
    nowDur.textContent = fmt(audio.duration);
    timeTotal.textContent = fmt(audio.duration);
    updateStats();
    renderPlaylist();
  }
});

audio.addEventListener('ended', () => { isPlaying = false; playNext(); });

progressTrack.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = progressTrack.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

// ─── RENDER PLAYLIST ──────────────────────────────────────────────────────────
function renderPlaylist() {
  playlist.innerHTML = '';

  if (tracks.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'status-msg';
    msg.textContent = 'no recordings yet';
    playlist.appendChild(msg);
    return;
  }

  tracks.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item'
      + (i === current ? ' active' : '')
      + (i === current && isPlaying ? ' playing' : '');

    item.innerHTML = `
      <div class="playing-dot"></div>
      <span class="item-num">${String(i+1).padStart(2,'0')}</span>
      <span class="item-name">${esc(t.name)}</span>
      <span class="item-dur">${t.duration ? fmt(t.duration) : '—'}</span>
    `;

    item.addEventListener('click', () => {
      if (i === current) togglePlay();
      else loadTrack(i);
    });

    playlist.appendChild(item);
  });

  updateStats();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
btnPlay.addEventListener('click', togglePlay);
btnPrev.addEventListener('click', playPrev);
btnNext.addEventListener('click', playNext);

modeToggle.addEventListener('click', () => {
  loopAll = !loopAll;
  modeToggle.classList.toggle('active', loopAll);
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') playNext();
  if (e.code === 'ArrowLeft') playPrev();
});

// ─── START ────────────────────────────────────────────────────────────────────
loadManifest();
</script>
</body>
</html>
